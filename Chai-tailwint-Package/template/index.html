<!DOCTYPE html>
<html>
<head>
  <title>Docs - ChaiTailwind</title>

  <link rel="stylesheet" href="../dist/chai.css">
</head>
<body class="chai-bg-gray-50 chai-dark-bg-gray-900 chai-text-gray-900 chai-dark-text-white">

  <h1 class="chai-fs-24 chai-fw-bold chai-mb-20">
    ✅ ChaiTailwind Test
  </h1>

  <div class="chai-p-20 chai-mb-20 chai-bg-red-100 chai-dark-bg-red-800">
    Spacing Test
  </div>

  <div class="chai-bg-blue-500 chai-text-white chai-p-20 chai-mb-20 chai-dark-bg-blue-600">
    Color Test
  </div>

  <div class="chai-flex chai-justify-center chai-items-center chai-bg-gray-200 chai-dark-bg-gray-800 chai-h-100 chai-mb-20">
    Flex Center
  </div>

  <p class="chai-fs-18 chai-lh-24 chai-fw-medium chai-mb-20">
    Typography Test
  </p>

  <div class="chai-border chai-bw-2 chai-bc-blue-500 chai-rounded-10 chai-p-20 chai-mb-20 chai-dark-bg-gray-800">
    Border + Radius
  </div>

  <div class="chai-shadow-0px-4px-10px-gray chai-p-20 chai-mb-20 chai-dark-bg-gray-800">
    Shadow Test
  </div>

  <button class="chai-bg-blue-500 chai-text-white chai-p-10 chai-hover-bg-red-500 chai-mb-20 chai-dark-bg-blue-600">
    Hover Me
  </button>

  <div class="chai-relative chai-bg-gray-200 chai-dark-bg-gray-800 chai-h-100 chai-mb-20">
    <div class="chai-absolute chai-top-10 chai-left-10 chai-bg-red-500 chai-p-10">
      Positioned
    </div>
  </div>

  <div class="chai-bg-img-hero chai-bg-full chai-bg-center chai-h-200 chai-mb-20"></div>

  <div class="chai-bg-gradient-blue-purple chai-p-20 chai-mb-20">
    Gradient Test
  </div>

  <div class="chai-p-10 chai-md-p-40 chai-bg-green-300 chai-dark-bg-green-700 chai-mb-20">
    Responsive
  </div>

  <button onclick="toggleDark()" class="chai-p-10 chai-bg-gray-200 chai-dark-bg-gray-100">
    Toggle Dark
  </button>

  <script>
    function toggleDark() {
      document.body.classList.toggle("dark");
    }
  </script>

</body>
</html>
